services:
  mariadb:
    build:
      context: ./requirements/mariadb
      dockerfile: Dockerfile
    env_file:
      - .env
    volumes:
      - ../secrets:/run/secrets
      - db_volume:/var/lib/mysql

volumes:
  db_volume:
    driver: local
    driver_opts:
      type: none
      device: /home/borabi/data/mariadb
      o: bind
